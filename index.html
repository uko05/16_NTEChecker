<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTEチェッカー - うーこの部屋</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ffcc00">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="NTEチェッカー">

  <!-- Favicon -->
  <link rel="icon" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/favicon.ico" type="image/x-icon">
  <link rel="icon" sizes="16x16" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/favicon-16x16.png">
  <link rel="icon" sizes="32x32" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/favicon-32x32.png">
  <link rel="apple-touch-icon" href="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/favicon_io/apple-touch-icon.png">

  <style>
    /* font/mihoyo-zenzero.ttf を 13_ArtifactCheck/font/ からコピーしてください */
    @font-face {
      font-family: 'MihoyoZenZero';
      src: url('font/mihoyo-zenzero.ttf') format('truetype');
    }

    :root {
      --bg:      #f4f4f9;
      --surface: #ffffff;
      --surface2:#eeeeee;
      --accent:  #ffcc00;
      --text:    #333333;
      --muted:   #888888;
      --border:  #dddddd;
      --font:    'MihoyoZenZero', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      --max-w:   680px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 72px;
    }

    /* ========== ヘッダー ========== */
    header {
      background: var(--surface);
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      min-height: 56px;
      padding: 8px 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .header-top h1 {
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 0.05em;
    }

    .header-actions {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .settings-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 9px;
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: bold;
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      line-height: 1.6;
    }
    .settings-btn:hover {
      background: var(--accent);
      border-color: #d4a800;
    }

    /* ========== カウントダウンバー ========== */
    .countdown-bar {
      border-top: 1px solid var(--border);
      background: rgba(255,204,0,0.08);
      padding: 5px 16px;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .countdown-bar .cd-label { margin-right: 6px; }
    .countdown-bar .cd-time {
      font-weight: bold;
      color: var(--text);
      font-size: 0.85rem;
      letter-spacing: 0.04em;
    }

    /* ========== タブバー ========== */
    .tab-bar {
      border-top: 1px solid var(--border);
      display: flex;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 9px 4px 7px;
      font-family: var(--font);
      font-size: 0.78rem;
      color: var(--muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      margin-bottom: -1px;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
      font-weight: bold;
      background: rgba(255,204,0,0.07);
    }

    .tab-badge {
      display: inline-block;
      background: var(--surface2);
      color: var(--muted);
      font-size: 0.65rem;
      font-weight: bold;
      padding: 1px 6px;
      border-radius: 10px;
      min-width: 30px;
      text-align: center;
      transition: background 0.15s, color 0.15s;
    }
    .tab-btn.active .tab-badge { background: var(--accent); color: #554400; }
    .tab-badge.all-done { background: #4caf50 !important; color: #fff !important; }

    /* ========== メインコンテンツ ========== */
    main {
      max-width: var(--max-w);
      margin: 0 auto;
      padding: 16px;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ========== チェックリスト ========== */
    .checklist {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .check-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 13px 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .check-item:hover { border-color: rgba(255,204,0,0.6); }
    .check-item:active { background: rgba(255,204,0,0.05); }

    .check-item.checked {
      background: rgba(255,204,0,0.07);
      border-color: rgba(255,204,0,0.35);
      opacity: 0.6;
    }
    .check-item.checked .check-label {
      text-decoration: line-through;
      color: var(--muted);
    }

    .check-box {
      width: 22px;
      height: 22px;
      border: 2px solid var(--border);
      border-radius: 5px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .check-item.checked .check-box {
      background: var(--accent);
      border-color: #d4a800;
    }
    .check-item.checked .check-box::after {
      content: '';
      width: 11px;
      height: 6px;
      border-left: 2.5px solid #554400;
      border-bottom: 2.5px solid #554400;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    .check-label {
      font-size: 0.88rem;
      line-height: 1.45;
      flex: 1;
      transition: color 0.15s;
    }

    /* 複数チェックボックス */
    .multi-boxes {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .check-box.box-checked {
      background: var(--accent);
      border-color: #d4a800;
    }
    .check-box.box-checked::after {
      content: '';
      width: 11px; height: 6px;
      border-left: 2.5px solid #554400;
      border-bottom: 2.5px solid #554400;
      transform: rotate(-45deg) translateY(-1px);
      display: block;
    }

    /* 初回イントロ */
    .intro-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 90;
    }
    .intro-tooltip {
      position: fixed;
      top: 64px;
      right: 8px;
      background: var(--surface);
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.22);
      z-index: 150;
      max-width: 200px;
      text-align: center;
    }
    .intro-tooltip::before {
      content: '';
      position: absolute;
      top: -10px;
      right: 14px;
      border: 7px solid transparent;
      border-bottom-color: var(--surface);
      border-top: none;
    }
    .intro-msg {
      font-size: 0.86rem;
      line-height: 1.55;
      margin-bottom: 10px;
      color: var(--text);
    }
    .intro-ok {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      padding: 6px 18px;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: bold;
      color: #554400;
      cursor: pointer;
    }

    .all-done-msg {
      text-align: center;
      color: #4caf50;
      font-size: 0.95rem;
      font-weight: bold;
      padding: 20px 0 8px;
    }

    /* ========== 設定パネル ========== */
    .settings-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.38);
      z-index: 500;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s;
    }
    .settings-overlay.open {
      opacity: 1;
      pointer-events: auto;
    }

    .settings-panel {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: min(340px, 88vw);
      background: var(--surface);
      box-shadow: -4px 0 24px rgba(0,0,0,0.14);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.22s ease;
    }
    .settings-overlay.open .settings-panel { transform: translateX(0); }

    .settings-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 2px solid var(--accent);
      flex-shrink: 0;
    }
    .settings-header h2 { font-size: 0.95rem; font-weight: bold; }

    .settings-close-btn {
      background: none; border: none;
      font-size: 1.15rem; cursor: pointer;
      color: var(--muted); padding: 4px 6px;
      border-radius: 4px; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    .settings-close-btn:hover { color: var(--text); background: var(--surface2); }

    .settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    .settings-section { margin-bottom: 24px; }

    .settings-section-title {
      font-size: 0.7rem;
      font-weight: bold;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
      margin-bottom: 10px;
    }

    .settings-cat-label {
      font-size: 0.76rem;
      font-weight: bold;
      color: var(--text);
      margin: 10px 0 5px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      gap: 10px;
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-label { font-size: 0.83rem; flex: 1; line-height: 1.4; }

    .toggle-switch {
      position: relative;
      width: 38px; height: 21px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; position: absolute; }

    .toggle-slider {
      position: absolute; inset: 0;
      background: var(--surface2);
      border-radius: 21px;
      cursor: pointer;
      transition: background 0.18s;
      border: 1.5px solid var(--border);
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 15px; height: 15px;
      background: var(--muted);
      border-radius: 50%;
      left: 2px; top: 1px;
      transition: transform 0.18s, background 0.18s;
    }
    .toggle-switch input:checked + .toggle-slider { background: var(--accent); border-color: #d4a800; }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(17px);
      background: #554400;
    }

    /* カスタムタスク */
    .cat-btns { display: flex; gap: 5px; margin-bottom: 8px; }
    .cat-btn {
      flex: 1;
      padding: 5px 4px;
      font-family: var(--font);
      font-size: 0.7rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 5px;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.15s;
    }
    .cat-btn.active { background: var(--accent); border-color: #d4a800; color: #554400; font-weight: bold; }

    .custom-input-row { display: flex; gap: 6px; margin-bottom: 10px; }

    .custom-input {
      flex: 1;
      padding: 8px 10px;
      font-family: var(--font);
      font-size: 0.83rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-input:focus { border-color: var(--accent); }

    .custom-add-btn {
      padding: 8px 12px;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: bold;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: #554400;
      transition: opacity 0.15s;
      white-space: nowrap;
    }
    .custom-add-btn:hover { opacity: 0.85; }

    .custom-task-row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }
    .custom-task-row:last-child { border-bottom: none; }

    .custom-cat-badge {
      font-size: 0.62rem;
      padding: 1px 5px;
      border-radius: 3px;
      background: var(--surface2);
      color: var(--muted);
      flex-shrink: 0;
    }
    .custom-task-name { flex: 1; font-size: 0.82rem; line-height: 1.4; }

    .custom-del-btn {
      background: none; border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.9rem;
      padding: 3px 5px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .custom-del-btn:hover { color: #e53935; background: rgba(229,57,53,0.08); }

    .no-custom-msg { font-size: 0.8rem; color: var(--muted); padding: 6px 0; }

    /* ========== フッター ========== */
    .site-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      z-index: 50;
    }
    .site-footer a { opacity: 0.75; transition: opacity 0.2s; }
    .site-footer a:hover { opacity: 1; }
    .site-footer img {
      width: 36px; height: 36px;
      border-radius: 8px;
      object-fit: cover;
      display: block;
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 480px) {
      .tab-btn { font-size: 0.72rem; }
      .check-label { font-size: 0.83rem; }
      .header-top h1 { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

  <!-- sidebar.js が左上ハンバーガーを自動挿入 -->

  <header id="main-header">
    <div class="header-top">
      <h1 id="site-title">NTEチェッカー</h1>
      <div class="header-actions">
        <button class="settings-btn" id="settings-btn">⚙</button>
      </div>
    </div>

    <div class="countdown-bar" id="countdown-bar">
      <span class="cd-label" id="cd-label">次のリセットまで</span>
      <span class="cd-time" id="cd-time">--:--:--</span>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="daily">
        デイリー
        <span class="tab-badge" id="badge-daily">0/0</span>
      </button>
      <button class="tab-btn" data-tab="weekly">
        ウィークリー
        <span class="tab-badge" id="badge-weekly">0/0</span>
      </button>
      <button class="tab-btn" data-tab="biweekly">
        隔週
        <span class="tab-badge" id="badge-biweekly">0/0</span>
      </button>
    </div>
  </header>

  <main id="main">
    <div id="panel-daily"    class="tab-panel active"></div>
    <div id="panel-weekly"   class="tab-panel"></div>
    <div id="panel-biweekly" class="tab-panel"></div>
  </main>

  <!-- 設定パネル -->
  <div class="settings-overlay" id="settings-overlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h2 id="settings-title">タスク設定</h2>
        <button class="settings-close-btn" id="settings-close">✕</button>
      </div>
      <div class="settings-body" id="settings-body"></div>
    </div>
  </div>

  <!-- フッター -->
  <footer class="site-footer">
    <a href="https://x.com/uko_dayo_" target="_blank" rel="noopener">
      <img src="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/footer_icon/twitter_image.png" alt="Twitter">
    </a>
    <a href="https://t.co/0jAcAV2GJv" target="_blank" rel="noopener">
      <img src="https://cdn.jsdelivr.net/gh/uko05/99_SharedImage@main/00_common/footer_icon/discord_image.png" alt="Discord">
    </a>
  </footer>

  <script type="module">
    import { CONFIG, TASKS } from './tasks.js';

    // ========== 状態 ==========
    let activeTab = 'daily';

    const LS = {
      activeTab:  'nte_activeTab',
      checks:     tab => `nte_checks_${tab}`,
      lastReset:  tab => `nte_lastReset_${tab}`,
      hidden:     'nte_hidden',
      custom:     'nte_custom',
    };

    // ========== リセット時刻計算 ==========
    function lastDaily() {
      const d = new Date(); d.setHours(5,0,0,0);
      if (d > new Date()) d.setDate(d.getDate() - 1);
      return d;
    }
    function nextDaily() { return new Date(lastDaily().getTime() + 86400000); }

    function lastWeekly() {
      const d = new Date(); d.setHours(5,0,0,0);
      const day = d.getDay();
      d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
      if (d > new Date()) d.setDate(d.getDate() - 7);
      return d;
    }
    function nextWeekly() { return new Date(lastWeekly().getTime() + 7 * 86400000); }

    function lastBiweekly() {
      const base = new Date(CONFIG.biweeklyBaseDate + 'T05:00:00');
      const diff = Date.now() - base.getTime();
      if (diff < 0) return base;
      return new Date(base.getTime() + Math.floor(diff / (14 * 86400000)) * 14 * 86400000);
    }
    function nextBiweekly() { return new Date(lastBiweekly().getTime() + 14 * 86400000); }

    const resetFns = {
      daily:    { last: lastDaily,    next: nextDaily },
      weekly:   { last: lastWeekly,   next: nextWeekly },
      biweekly: { last: lastBiweekly, next: nextBiweekly },
    };

    // ========== 自動リセット ==========
    function checkAndReset() {
      ['daily','weekly','biweekly'].forEach(tab => {
        const actual  = resetFns[tab].last().getTime();
        const stored  = parseInt(localStorage.getItem(LS.lastReset(tab)) || '0');
        if (stored < actual) {
          localStorage.removeItem(LS.checks(tab));
          localStorage.setItem(LS.lastReset(tab), actual);
        }
      });
    }

    // ========== チェック状態 ==========
    function getChecks(tab)           { return JSON.parse(localStorage.getItem(LS.checks(tab)) || '{}'); }
    function setCheck(tab, id, val)   { const c = getChecks(tab); c[id] = val; localStorage.setItem(LS.checks(tab), JSON.stringify(c)); }
    function getHidden()              { return JSON.parse(localStorage.getItem(LS.hidden)  || '{}'); }
    function setHidden(id, val)       { const h = getHidden(); h[id] = val; localStorage.setItem(LS.hidden,  JSON.stringify(h)); }
    function getCustom()              { return JSON.parse(localStorage.getItem(LS.custom)  || '[]'); }
    function saveCustom(arr)          { localStorage.setItem(LS.custom, JSON.stringify(arr)); }
    function addCustomTask(text, tab) { const a = getCustom(); a.push({ id:'c'+Date.now(), text, tab }); saveCustom(a); }
    function delCustomTask(id)        { saveCustom(getCustom().filter(t => t.id !== id)); }

    // ========== タスク一覧 ==========
    function allRaw(tab) {
      const result = [];
      (TASKS[tab] || []).forEach(t => {
        if (t.count > 1) {
          for (let i = 0; i < t.count; i++) {
            result.push({ id: `${t.id}_${i}`, label: t.text, parentId: t.id, isBuiltIn: true });
          }
        } else {
          result.push({ id: t.id, label: t.text, isBuiltIn: true });
        }
      });
      getCustom().filter(c => c.tab === tab).forEach(c => {
        result.push({ id: c.id, label: c.text, isBuiltIn: false });
      });
      return result;
    }
    function visibleTasks(tab) {
      const h = getHidden();
      return allRaw(tab).filter(t => !h[t.parentId || t.id]);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ========== バッジ更新 ==========
    function updateBadge(tab) {
      const tasks = visibleTasks(tab);
      const checks = getChecks(tab);
      const done  = tasks.filter(t => checks[t.id]).length;
      const total = tasks.length;
      const badge = document.getElementById(`badge-${tab}`);
      if (!badge) return;
      badge.textContent = `${done}/${total}`;
      badge.classList.toggle('all-done', total > 0 && done === total);
    }

    // ========== チェックリスト描画 ==========
    function renderChecklist(tab) {
      const panel  = document.getElementById(`panel-${tab}`);
      const tasks  = visibleTasks(tab);
      const checks = getChecks(tab);
      panel.innerHTML = '';

      const ul = document.createElement('ul');
      ul.className = 'checklist';

      const rendered = new Set();

      tasks.forEach(task => {
        if (task.parentId) {
          if (rendered.has(task.parentId)) return;
          rendered.add(task.parentId);

          const group = tasks.filter(t => t.parentId === task.parentId);
          const allChecked = group.every(t => checks[t.id]);

          const li = document.createElement('li');
          li.className = 'check-item' + (allChecked ? ' checked' : '');

          const boxes = document.createElement('div');
          boxes.className = 'multi-boxes';
          group.forEach(t => {
            const box = document.createElement('div');
            box.className = 'check-box' + (checks[t.id] ? ' box-checked' : '');
            box.addEventListener('click', () => {
              const next = !checks[t.id];
              checks[t.id] = next;
              setCheck(tab, t.id, next);
              box.classList.toggle('box-checked', next);
              const nowAll = group.every(t2 => checks[t2.id]);
              li.classList.toggle('checked', nowAll);
              updateBadge(tab);
              renderAllDoneMsg(tab);
            });
            boxes.appendChild(box);
          });

          const lbl = document.createElement('span');
          lbl.className = 'check-label';
          lbl.textContent = task.label;

          li.append(boxes, lbl);
          ul.appendChild(li);
        } else {
          const li  = document.createElement('li');
          li.className = 'check-item' + (checks[task.id] ? ' checked' : '');

          const box = document.createElement('div');
          box.className = 'check-box';

          const lbl = document.createElement('span');
          lbl.className = 'check-label';
          lbl.textContent = task.label;

          li.append(box, lbl);
          li.addEventListener('click', () => {
            const next = !li.classList.contains('checked');
            setCheck(tab, task.id, next);
            li.classList.toggle('checked', next);
            updateBadge(tab);
            renderAllDoneMsg(tab);
          });

          ul.appendChild(li);
        }
      });

      panel.appendChild(ul);
      renderAllDoneMsg(tab);
      updateBadge(tab);
    }

    function renderAllDoneMsg(tab) {
      const panel  = document.getElementById(`panel-${tab}`);
      panel.querySelector('.all-done-msg')?.remove();
      const tasks  = visibleTasks(tab);
      const checks = getChecks(tab);
      if (tasks.length > 0 && tasks.every(t => checks[t.id])) {
        const div = document.createElement('div');
        div.className = 'all-done-msg';
        div.textContent = '✓ すべて完了！';
        panel.appendChild(div);
      }
    }

    // ========== カウントダウン ==========
    function fmtCountdownHMS(ms) {
      if (ms <= 0) return '00:00:00';
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    function fmtCountdownDH(ms) {
      if (ms <= 0) return '0日 0時間';
      const d = Math.floor(ms / 86400000);
      const h = Math.floor((ms % 86400000) / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      if (d > 0) return `${d}日 ${h}時間`;
      return `${h}時間 ${m}分`;
    }

    function tickCountdown() {
      const bar   = document.getElementById('countdown-bar');
      const label = document.getElementById('cd-label');
      const time  = document.getElementById('cd-time');


      const next = resetFns[activeTab]?.next() ?? nextDaily();
      const diff = next - Date.now();
      label.textContent = '次のリセットまで';
      time.textContent  = activeTab === 'daily' ? fmtCountdownHMS(diff) : fmtCountdownDH(diff);

      if (diff <= 0) { checkAndReset(); renderAllPanels(); }
    }

    // ========== 設定描画 ==========
    function renderSettings() {
      const body  = document.getElementById('settings-body');
      const hidden = getHidden();
      const custom = getCustom();
      const tabs   = ['daily','weekly','biweekly'];
      const tabLbl = { daily: 'デイリー', weekly: 'ウィークリー', biweekly: '隔週' };

      let html = `<div class="settings-section"><div class="settings-section-title">タスク表示設定</div>`;

      tabs.forEach(tab => {
        const all = [
          ...(TASKS[tab] || []).map(tk => ({ id: tk.id, label: tk.text })),
          ...custom.filter(c => c.tab === tab).map(c => ({ id: c.id, label: c.text })),
        ];
        if (all.length === 0) return;
        html += `<div class="settings-cat-label">${tabLbl[tab]}</div>`;
        all.forEach(tk => {
          const checked = !hidden[tk.id];
          html += `
            <div class="toggle-row">
              <span class="toggle-label">${escHtml(tk.label)}</span>
              <label class="toggle-switch">
                <input type="checkbox" data-tid="${tk.id}" ${checked ? 'checked' : ''}>
                <span class="toggle-slider"></span>
              </label>
            </div>`;
        });
      });

      html += `</div>
        <div class="settings-section">
          <div class="settings-section-title">カスタムタスク</div>
          <div class="cat-btns">
            <button class="cat-btn active" data-cat="daily">デイリー</button>
            <button class="cat-btn" data-cat="weekly">ウィークリー</button>
            <button class="cat-btn" data-cat="biweekly">隔週</button>
          </div>
          <div class="custom-input-row">
            <input class="custom-input" id="custom-input" placeholder="タスク名を入力" maxlength="50">
            <button class="custom-add-btn" id="custom-add-btn">追加</button>
          </div>
          <div id="custom-list">`;

      if (custom.length === 0) {
        html += `<p class="no-custom-msg">（なし）</p>`;
      } else {
        custom.forEach(c => {
          html += `
            <div class="custom-task-row">
              <span class="custom-cat-badge">${escHtml(tabLbl[c.tab] || c.tab)}</span>
              <span class="custom-task-name">${escHtml(c.text)}</span>
              <button class="custom-del-btn" data-did="${c.id}">✕</button>
            </div>`;
        });
      }

      html += `</div></div>`;
      body.innerHTML = html;

      // トグル
      body.querySelectorAll('.toggle-row input[type="checkbox"]').forEach(cb => {
        cb.addEventListener('change', () => { setHidden(cb.dataset.tid, !cb.checked); renderAllPanels(); });
      });

      // カテゴリ選択
      let selCat = 'daily';
      body.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          body.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          selCat = btn.dataset.cat;
        });
      });

      // 追加
      const addBtn = body.querySelector('#custom-add-btn');
      const input  = body.querySelector('#custom-input');
      const doAdd  = () => {
        const text = input.value.trim();
        if (!text) return;
        addCustomTask(text, selCat);
        input.value = '';
        renderSettings();
        renderAllPanels();
      };
      addBtn.addEventListener('click', doAdd);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') doAdd(); });

      // 削除
      body.querySelectorAll('.custom-del-btn').forEach(btn => {
        btn.addEventListener('click', () => { delCustomTask(btn.dataset.did); renderSettings(); renderAllPanels(); });
      });
    }

    // ========== 全パネル再描画 ==========
    function renderAllPanels() {
      renderChecklist('daily');
      renderChecklist('weekly');
      renderChecklist('biweekly');
    }

    // ========== タブ切り替え ==========
    function switchTab(tab) {
      activeTab = tab;
      localStorage.setItem(LS.activeTab, tab);
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tab}`));
      tickCountdown();
    }

    // ========== イベント ==========
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    const overlay = document.getElementById('settings-overlay');
    document.getElementById('settings-btn').addEventListener('click', () => {
      renderSettings();
      overlay.classList.add('open');
    });
    document.getElementById('settings-close').addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

    // ========== 初回イントロ ==========
    function showIntroIfNeeded() {
      if (localStorage.getItem('nte_intro_shown')) return;

      const overlay = document.createElement('div');
      overlay.className = 'intro-overlay';

      const tip = document.createElement('div');
      tip.className = 'intro-tooltip';
      tip.innerHTML = `
        <p class="intro-msg">⚙ ここから<br>細かく設定できるよ！</p>
        <button class="intro-ok">わかった！</button>
      `;

      const dismiss = () => {
        overlay.remove();
        tip.remove();
        localStorage.setItem('nte_intro_shown', '1');
      };

      overlay.addEventListener('click', dismiss);
      tip.querySelector('.intro-ok').addEventListener('click', e => { e.stopPropagation(); dismiss(); });

      document.body.append(overlay, tip);
    }

    // ========== 初期化 ==========
    checkAndReset();
    renderAllPanels();

    const savedTab = localStorage.getItem(LS.activeTab);
    if (savedTab && ['daily','weekly','biweekly'].includes(savedTab)) switchTab(savedTab);
    else tickCountdown();

    setInterval(tickCountdown, 1000);
    setTimeout(showIntroIfNeeded, 400);

    // 裏から復帰したときにリセット判定と再描画
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        checkAndReset();
        renderAllPanels();
        tickCountdown();
      }
    });

    // PWA Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>

  <script src="https://uko05.github.io/TopPage00/shared/sidebar.js"></script>
</body>
